name: Show secret
on:
  push:
    branches: [ "stage" ]
  pull_request:
    branches: [ "main" ]    
defaults:
  run:
    shell: bash
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VARIABLE_ENTORNO: 0.145.0
    steps:
      - name: Mostrar secret
        run: |
          echo "Un secret creado en el repositorio: ${{ secrets.TEST_SECRET }}" 
          echo "Variables de Github (autor del commit es) ${{ github.actor }}"
          echo "La VARIABLE_ENTORNO declarada en este archivo es: ${VARIABLE_ENTORNO}"   
      
      # CRUCIAL: Descargar el código del repositorio en la máquina virtual
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      # Configurar Buildx (permite compilar para múltiples plataformas y usar caché avanzada)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3    
      
      # Iniciar sesión en Docker Hub utilizando del repositorio
      - name: Login in docker hub
        # ¡PRIMER IF! Solo nos logueamos si NO es un Pull Request
        # (No tiene sentido loguearse si no vamos a subir nada)
        if: github.event_name == 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.TOKEN_USERNAME_DOCKERHUB }}
          password: ${{ secrets.TOKEN_WORKFLOW_DOCKERHUB }}  
      
      # 4. Construir la imagen y subirla automáticamente
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: . # Indica que el contexto de compilación es la raíz de tu repositorio.
          file: ./img/Dockerfile # Ruta hacia tu archivo Dockerfile. Puedes omitir esta línea si se encuentra en la raíz del proyecto.
          # push: true # Le ordena a la acción que suba (push) la imagen a Docker Hub inmediatamente después de compilarla con éxito. Con el valor 'false'  no sube la imagen.  
          # ¡SEGUNDO IF DINÁMICO! 
          # 'push' será true solo si el evento es un push directo a 'main'
          push: ${{ github.event_name == 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.TOKEN_USERNAME_DOCKERHUB }}/my-hello-world:latest
            ${{ secrets.TOKEN_USERNAME_DOCKERHUB }}/my-hello-world:${{ github.sha }}
